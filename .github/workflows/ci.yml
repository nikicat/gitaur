name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: fmt + taplo + clippy + build + test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf pacman rustup taplo-cli
          # rust-toolchain.toml drives channel + components on first cargo call.

      - uses: actions/checkout@v6

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: taplo fmt
        run: taplo fmt --check

      - name: taplo lint
        run: taplo lint

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: build
        run: cargo build --all-targets --locked

      - name: test
        run: cargo test --all-features --locked

  container:
    name: container tests (Tier 2) + coverage
    runs-on: ubuntu-latest
    # The Tier-2 gate. Runs the black-box container suite (tests/container,
    # smoke + extended) end-to-end against real pacman/makepkg, in parallel to
    # the `ci` (Tier 1) job. A container-test failure fails this job — that is
    # what puts Tier 2 in CI. Coverage is a byproduct: the suite runs against an
    # instrumented binary, so the same run also yields line coverage.
    #
    # Everything happens inside the test image (tests/container/Dockerfile), so
    # the runner only needs podman — preinstalled on ubuntu-latest. The
    # orchestrator (scripts/coverage.sh) builds the image, runs cargo test +
    # the podman suite inside it, and emits three lcov files (rust / podman /
    # combined) for separate Codecov flag uploads.
    steps:
      - uses: actions/checkout@v6

      - name: Cache test image + cargo state
        uses: actions/cache@v5
        with:
          # target/ contains both the instrumented build artifacts and the
          # project-local CARGO_HOME (target/coverage-cargo) used by the
          # in-image cargo invocations. Caching it makes incremental coverage
          # runs cheap; cold runs still take a full cargo build + test.
          path: |
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock', 'tests/container/Dockerfile') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Run container suite (Tier 2) + coverage
        # Runs Tier 1 (cargo test) + Tier 2 (podman smoke + extended) against an
        # instrumented binary and produces coverage/lcov-{rust,podman,combined}.info.
        # Exits non-zero — failing this job — if any container test fails. The
        # upload steps below use `if: always()` so partial coverage still reaches
        # Codecov for diagnosis even when a test fails.
        run: bash scripts/coverage.sh

      - name: Upload rust coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov-rust.info
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload podman coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov-podman.info
          flags: podman
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload combined coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov-combined.info
          flags: combined
          fail_ci_if_error: false
          # A token is required: tokenless uploads are rejected on this repo
          # with "Token required because branch is protected". Add a
          # CODECOV_TOKEN repo secret (Codecov → repo settings → copy the
          # upload token) for any of these uploads to land.
          token: ${{ secrets.CODECOV_TOKEN }}
