name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: fmt + taplo + clippy + build + test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf pacman rustup taplo-cli
          # rust-toolchain.toml drives channel + components on first cargo call.

      - uses: actions/checkout@v6

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: taplo fmt
        run: taplo fmt --check

      - name: taplo lint
        run: taplo lint

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: build
        run: cargo build --all-targets --locked

      - name: test
        run: cargo test --all-features --locked

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Runs in parallel to the main `ci` job. Must use the same Arch container
    # because `alpm-sys` link-checks against libalpm via pkg-config, which is
    # only packaged on Arch. cargo-llvm-cov is shipped in Arch's extra repo.
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf pacman rustup cargo-llvm-cov
          # rust-toolchain.toml drives channel + components on first cargo call.

      - uses: actions/checkout@v6

      - name: Install llvm-tools-preview component
        # cargo-llvm-cov needs the rustc-emitted profiler runtime; the
        # component lands in the toolchain pinned by rust-toolchain.toml.
        run: rustup component add llvm-tools-preview

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Collect coverage (lcov)
        # Regex matches the one in justfile's `ignore_regex`: strip CLI glue
        # (src/main.rs), the shared testing module, and example binaries.
        run: |
          cargo llvm-cov --all-features --locked \
            --ignore-filename-regex '(examples/|src/main\.rs|src/testing\.rs)' \
            --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
          # Public repo: no token needed — codecov-action authenticates via
          # GitHub OIDC. If the repo ever goes private, add
          # `token: ${{ secrets.CODECOV_TOKEN }}` here.
          use_oidc: true
