name: CI

on:
  push:
    # main only: PR branches are covered by the pull_request event, and a
    # both-events trigger runs everything twice per push — worse, the
    # concurrency group's cancelled twin leaves CANCELLED check runs with
    # the required-check names on the sha, which blocks the merge under
    # the branch protection policy.
    branches: [main]
  pull_request:

concurrency:
  # Rapid successive pushes to a PR branch cancel the outdated in-progress
  # run (head_ref is set on pull_request events; ref_name covers main
  # pushes). main is exempt from cancellation: every merge commit's run
  # must finish to upload the codecov baseline the next PR compares
  # against.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: fmt + taplo + clippy + build + test
    runs-on: ubuntu-latest
    container:
      # latest as of 2026-07-06
      image: archlinux:latest@sha256:681569955d1d17313ef7134acc8b5cd8adcda2fc24709bed472d95e1cf3d71a1
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf pacman rustup taplo-cli
          # rust-toolchain.toml drives channel + components on first cargo call.

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache cargo registry and target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: taplo fmt
        run: taplo fmt --check

      - name: taplo lint
        run: taplo lint

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: build
        run: cargo build --all-targets --locked

      - name: test
        run: cargo test --all-features --locked

  pkgbuild:
    name: makepkg from tree
    runs-on: ubuntu-latest
    container:
      # latest as of 2026-07-06
      image: archlinux:latest@sha256:681569955d1d17313ef7134acc8b5cd8adcda2fc24709bed472d95e1cf3d71a1
    # Near-real packaging gate: build the rendered PKGBUILD with makepkg as an
    # unprivileged user under a PTY — what an interactive `makepkg` on a user's
    # machine looks like. The release workflow's test-build only runs against a
    # published tag, so without this job packaging breakage (missing depends,
    # release-profile-only check() failures — the other jobs test the debug profile —
    # Cargo.lock drift) surfaces after the release is already cut. makepkg
    # skips the download when the source file already sits next to the
    # PKGBUILD, so a `git archive HEAD` tarball stands in for the tag tarball.
    steps:
      - name: Install build dependencies
        run: pacman -Syu --noconfirm --needed base-devel rust git

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Render PKGBUILD against a tree tarball
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ver=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          mkdir -p /tmp/aur-build
          # sha256sums stays the template's 'SKIP': the tarball is built here,
          # not downloaded, so there is nothing to verify.
          sed "/^pkgver=/s/@PKGVER@/$ver/" packaging/aur/PKGBUILD.in > /tmp/aur-build/PKGBUILD
          git archive --format=tar.gz --prefix="aurox-$ver/" \
              -o "/tmp/aur-build/aurox-$ver.tar.gz" HEAD

      - name: Build the package as an unprivileged user under a PTY
        run: |
          useradd -m builder
          chown -R builder /tmp/aur-build
          cd /tmp/aur-build
          sudo -u builder script -qec "makepkg -f --noconfirm" /dev/null

  container:
    name: container tests + coverage
    runs-on: ubuntu-latest
    # The container-suite gate. Runs the black-box container suite
    # (tests/container, smoke + extended) end-to-end against real
    # pacman/makepkg, in parallel to the `ci` job. A container-test failure
    # fails this job — that is what puts the suite in CI. Coverage is a
    # byproduct: the suite runs against an instrumented binary, so the same
    # run also yields line coverage.
    #
    # Everything happens inside the test image (tests/container/Dockerfile), so
    # the runner only needs podman — preinstalled on ubuntu-latest. The
    # orchestrator (scripts/coverage.sh) builds the image, runs cargo test +
    # the podman suite inside it, and emits three lcov files (rust / podman /
    # combined) for separate Codecov flag uploads.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache test image + cargo state
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # target/ contains both the instrumented build artifacts and the
          # project-local CARGO_HOME (target/coverage-cargo) used by the
          # in-image cargo invocations. Caching it makes incremental coverage
          # runs cheap; cold runs still take a full cargo build + test.
          # Safe to restore across commits only because scripts/coverage.sh
          # purges ghost workspace binaries before building — a restored cache
          # can carry stale-generation executables whose embedded coverage
          # maps would otherwise pollute every report (see step 1 there).
          path: |
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock', 'tests/container/Dockerfile') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Run container suite + coverage
        # Runs cargo test + the podman suite (smoke + extended) against an
        # instrumented binary and produces coverage/lcov-{rust,podman,combined}.info.
        # Exits non-zero — failing this job — if any container test fails. The
        # upload steps below use `if: always()` so partial coverage still reaches
        # Codecov for diagnosis even when a test fails.
        run: bash scripts/coverage.sh

      - name: Upload rust coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov-rust.info
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload podman coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov-podman.info
          flags: podman
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload combined coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov-combined.info
          flags: combined
          fail_ci_if_error: false
          # A token is required: tokenless uploads are rejected on this repo
          # with "Token required because branch is protected". Add a
          # CODECOV_TOKEN repo secret (Codecov → repo settings → copy the
          # upload token) for any of these uploads to land.
          token: ${{ secrets.CODECOV_TOKEN }}
