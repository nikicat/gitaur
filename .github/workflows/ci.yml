name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: fmt + taplo + clippy + build + test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf pacman rustup taplo-cli
          # rust-toolchain.toml drives channel + components on first cargo call.

      - uses: actions/checkout@v6

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: taplo fmt
        run: taplo fmt --check

      - name: taplo lint
        run: taplo lint

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: build
        run: cargo build --all-targets --locked

      - name: test
        run: cargo test --all-features --locked

  coverage:
    name: coverage (rust + podman + combined)
    runs-on: ubuntu-latest
    # Runs in parallel to the main `ci` job. Everything coverage-related
    # happens inside the test image (tests/container/Dockerfile), so the
    # runner only needs podman — which is preinstalled on ubuntu-latest.
    # The orchestrator (scripts/coverage.sh) builds the image, runs cargo
    # test inside it, runs the podman test suite, and emits three lcov
    # files (rust / podman / combined) for separate Codecov flag uploads.
    steps:
      - uses: actions/checkout@v6

      - name: Cache test image + cargo state
        uses: actions/cache@v5
        with:
          # target/ contains both the instrumented build artifacts and the
          # project-local CARGO_HOME (target/coverage-cargo) used by the
          # in-image cargo invocations. Caching it makes incremental coverage
          # runs cheap; cold runs still take a full cargo build + test.
          path: |
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock', 'tests/container/Dockerfile') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Run scripts/coverage.sh
        # Produces coverage/lcov-{rust,podman,combined}.info + summaries.
        # Continues to the upload steps even on test failure so partial
        # coverage data still reaches Codecov for diagnosis.
        run: bash scripts/coverage.sh

      - name: Upload rust coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov-rust.info
          flags: rust
          fail_ci_if_error: false

      - name: Upload podman coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov-podman.info
          flags: podman
          fail_ci_if_error: false

      - name: Upload combined coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov-combined.info
          flags: combined
          fail_ci_if_error: false
          # Public repo: codecov-action's tokenless flow verifies the
          # repo+commit pair via the standard GITHUB_TOKEN, no extra
          # permissions needed. If the repo ever goes private, add
          # `token: ${{ secrets.CODECOV_TOKEN }}` here.
