name: Release

# Merging a Cargo.toml version bump to main IS the release: the `release`
# job tags the merge commit, creates the GitHub release, and the build/publish
# jobs push the package to the AUR. Everything lives in one workflow because
# tags and releases created with the default GITHUB_TOKEN deliberately do not
# trigger other workflows (GitHub's recursion guard).
#
# workflow_dispatch republishes an existing release (e.g. after a PKGBUILD
# template fix) without creating a tag.

on:
  push:
    branches: [main]
    paths: [Cargo.toml]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to republish (e.g. v0.1.0)'
        required: true

# One release at a time; a queued newer bump waits for the current one.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: tag + create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
      publish: ${{ steps.decide.outputs.publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Decide whether this push is a new release
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -eu
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "republish of existing tag $INPUT_TAG"
            echo "tag=$INPUT_TAG" >>"$GITHUB_OUTPUT"
            echo "publish=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          ver=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          tag="v$ver"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "$tag already exists — Cargo.toml change without a version bump, nothing to release"
            echo "publish=false" >>"$GITHUB_OUTPUT"
          else
            gh release create "$tag" --target "$GITHUB_SHA" --generate-notes
            echo "publish=true" >>"$GITHUB_OUTPUT"
          fi

  build:
    name: render + test-build PKGBUILD
    needs: release
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    container:
      # latest as of 2026-07-06
      image: archlinux:latest@sha256:681569955d1d17313ef7134acc8b5cd8adcda2fc24709bed472d95e1cf3d71a1
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Install build dependencies
        run: pacman -Syu --noconfirm --needed base-devel rust git pacman-contrib

      # The triggering commit provides the PKGBUILD template; the *tag*
      # determines what the package builds (it's baked into source=()), so a
      # dispatch from a newer main can republish an old release with a
      # fixed template.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check tag matches Cargo.toml version at the tag
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --depth=1 origin "refs/tags/$TAG:refs/tags/$TAG"
          ver="${TAG#v}"
          cargo_ver=$(git show "refs/tags/$TAG:Cargo.toml" | sed -n 's/^version = "\(.*\)"/\1/p' | head -1)
          if [ "$ver" != "$cargo_ver" ]; then
            echo "tag $TAG (=$ver) does not match Cargo.toml version $cargo_ver at the tag" >&2
            exit 1
          fi

      - name: Render PKGBUILD
        run: |
          mkdir -p /tmp/aur-build
          # Scoped to the pkgver= line so the template's own comment about
          # @PKGVER@ survives rendering intact.
          sed "/^pkgver=/s/@PKGVER@/${TAG#v}/" packaging/aur/PKGBUILD.in > /tmp/aur-build/PKGBUILD

      - name: Fill checksums and build the package as an unprivileged user
        run: |
          useradd -m builder
          chown -R builder /tmp/aur-build
          cd /tmp/aur-build
          # updpkgsums downloads the source tarball and writes real sha256sums
          # into the PKGBUILD; makepkg then verifies them, so the PKGBUILD we
          # publish is exactly what was test-built. Filling checksums in the
          # deploy action instead would download the tarball into the AUR repo
          # checkout, where it must never be committed (the AUR caps blobs at
          # 488 KiB). --noconfirm because deps are preinstalled above.
          sudo -u builder updpkgsums
          sudo -u builder makepkg -f --noconfirm
          sudo -u builder sh -c 'makepkg --printsrcinfo > .SRCINFO'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pkgbuild
          # .SRCINFO counts as hidden and is silently dropped without the flag.
          include-hidden-files: true
          path: |
            /tmp/aur-build/PKGBUILD
            /tmp/aur-build/.SRCINFO

  publish:
    name: push to AUR
    needs: [release, build]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pkgbuild

      - name: Commit and push to the AUR (with retries)
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          # Host key pinned rather than ssh-keyscan'd at run time — a scan
          # from a compromised network would happily pin an attacker's key.
          # Verified 2026-07-11 against a successful push from a trusted box.
          echo 'aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN' \
            > ~/.ssh/aur_known_hosts
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o UserKnownHostsFile=$HOME/.ssh/aur_known_hosts -o IdentitiesOnly=yes"

          # Read over HTTPS — cloning over SSH would burn a connection against
          # the same rate limit the push has to get through.
          git clone https://aur.archlinux.org/aurox.git aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git config user.name 'Nikolay Bryskin'
          git config user.email 'nikicat@users.noreply.github.com'
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR already carries $TAG — nothing to push"
            exit 0
          fi
          git commit -m "Update to $TAG"

          # aur.archlinux.org's sshd intermittently drops connections from
          # shared GitHub-runner IPs before auth ("Connection closed by …
          # port 22") — fail2ban-style rate limiting, seen twice for v0.1.2.
          # Back off up to ~15 min total to outlast a typical ban window.
          tries=0
          until git push ssh://aur@aur.archlinux.org/aurox.git master; do
            tries=$((tries + 1))
            if [ "$tries" -ge 6 ]; then
              echo "push failed after $tries attempts" >&2
              exit 1
            fi
            delay=$((30 << (tries - 1)))
            echo "push attempt $tries failed; retrying in ${delay}s" >&2
            sleep "$delay"
          done
