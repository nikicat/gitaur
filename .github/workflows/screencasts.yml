name: Screencasts

# Record the demo set from this tree and publish it for review: casts + GIFs
# go to the aurox-ci-media sidecar repo (pr-<N>/ for PRs, main/ on merges —
# main/ doubles as the base for future comparisons), and a `screencasts`
# check run on the PR links the Pages-hosted player and embeds the GIFs.
# CI stays a thin wrapper over demos/build.sh: the same command reproduces
# everything locally (docs/plans/screencasts.md).

on:
  pull_request:
    # UI-affecting surfaces only — the demos can't change otherwise.
    paths:
      - 'src/**'
      - 'demos/**'
      - 'examples/**'
      - 'pty-harness/**'
      - 'tests/container/fixtures/**'
      - 'tests/container/Dockerfile'
      - '.github/workflows/screencasts.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'demos/**'
      - 'examples/**'
      - 'pty-harness/**'
      - 'tests/container/fixtures/**'
      - 'tests/container/Dockerfile'
      - '.github/workflows/screencasts.yml'

concurrency:
  # Superseded PR runs are useless — cancel them; main refreshes must all
  # land (each updates the media repo's main/).
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  demos:
    name: record + publish
    runs-on: ubuntu-latest
    # The media push needs the deploy-key secret and the check run needs
    # checks:write — both absent on fork PRs, so: same-repo PRs and main only.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache the container-built demo artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # demos/build.sh builds inside the test image with CARGO_HOME and
          # CARGO_TARGET_DIR under target/ (demo-cargo + demo-build), so the
          # whole registry+build state caches in one entry. Own key — sharing
          # the `ci` job's would collide on save (only one job per key wins),
          # leaving this job to cold-build every run. Exact-key only, no
          # restore-keys (the cache-growth rationale in ci.yml).
          path: target
          key: ${{ runner.os }}-demos-${{ hashFiles('**/Cargo.lock') }}

      - name: Record and render the demo set
        # Builds the test image (fonts + pinned agg baked in), cargo-builds
        # aurox + the demo drivers, records each demo hermetically in the
        # container, renders GIFs with the image's agg.
        run: bash demos/build.sh

      - name: Check out media repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: nikicat/aurox-ci-media
          ssh-key: ${{ secrets.CI_MEDIA_DEPLOY_KEY }}
          path: media

      - name: Publish recordings to aurox-ci-media
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            dest="pr-${{ github.event.pull_request.number }}"
          else
            dest="main"
          fi
          mkdir -p "media/$dest"
          rm -f "media/$dest"/*.gif "media/$dest"/*.cast "media/$dest"/*.txt
          # GIFs for the gallery, casts for the players, normalized .txt
          # transcripts for the base-vs-PR diff view (diff.html).
          cp docs/demo/*.gif target/demo-casts/*.cast target/demo-casts/*.txt "media/$dest/"
          cd media
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "recordings unchanged byte-wise? unlikely, but nothing to push"
            exit 0
          fi
          git commit -m "aurox ${{ github.event_name }}: $dest @ ${{ github.sha }}"
          # Concurrent runs race on this junk repo; rebase-retry a few times.
          for _ in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push

      - name: Attach the screencasts check run
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          raw="https://raw.githubusercontent.com/nikicat/aurox-ci-media/main/pr-$PR"
          play="https://nikicat.github.io/aurox-ci-media/play.html?cast=pr-$PR"

          # The GIFs are embedded as markdown images in the summary, not via
          # the check-run `output.images[]` gallery — that field is silently
          # dropped by the API. Markdown images resolve lazily, but GitHub's
          # camo proxy fetches (and may cache a 404 for) the URL the moment
          # the check renders, so wait for the just-pushed GIF to actually be
          # served by raw.githubusercontent before creating the check.
          for _ in $(seq 1 30); do
            curl -fsS -o /dev/null "$raw/search-install.gif" && break
            sleep 5
          done

          demos='[
            ["search-install","shell: search, stage, review gate, apply"],
            ["cli-install","aurox -S: PKGBUILD review, streamed build, sudo gate"],
            ["repo-install","aurox -S repo package: pacman-parity fast path"],
            ["upgrade","whole-system upgrade: repo + AUR in one change set"]
          ]'
          jq -n --arg sha "$HEAD_SHA" --arg raw "$raw" --arg play "$play" \
                --argjson demos "$demos" '
            ($demos | map(
              "#### \(.[0]) — \(.[1])\n\n"
              + "[![\(.[0])](\($raw)/\(.[0]).gif)](\($play)/\(.[0]).cast)\n\n"
              + "▶ [interactive player](\($play)/\(.[0]).cast) — scrub the timeline, copy text"
            ) | join("\n\n")) as $gallery |
            {
              name: "screencasts",
              head_sha: $sha,
              status: "completed",
              conclusion: "neutral",
              output: {
                title: "Demo screencasts recorded from this PR",
                summary: ("Recorded hermetically from this PR by `demos/build.sh` "
                  + "(the same command reproduces them locally). Click any GIF for "
                  + "the interactive player.\n\n"
                  + $gallery
                  + "\n\nBase (`main`) recordings for comparison: "
                  + "[player index](https://nikicat.github.io/aurox-ci-media/).")
              }
            }' \
          | gh api "repos/${{ github.repository }}/check-runs" --input -

      - name: Post the sticky screencast comment
        # The visible, notifying half of the check run: one comment per PR,
        # found again by its hidden marker and updated in place (no per-push
        # spam). It adds the base-vs-PR side-by-side player the check can't
        # link cleanly. The workflow's own path filter is the change gate —
        # it only runs when UI-affecting files change (see the note in the
        # plan doc on why committed transcripts aren't the gate here).
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          raw="https://raw.githubusercontent.com/nikicat/aurox-ci-media/main/pr-$PR"
          play="https://nikicat.github.io/aurox-ci-media/play.html?cast=pr-$PR"
          compare="https://nikicat.github.io/aurox-ci-media/compare.html?pr=$PR"
          textdiff="https://nikicat.github.io/aurox-ci-media/diff.html?pr=$PR"
          marker="<!-- aurox-screencasts -->"
          demos='[
            ["search-install","shell: search, stage, review gate, apply"],
            ["cli-install","aurox -S: PKGBUILD review, streamed build, sudo gate"],
            ["repo-install","aurox -S repo package: pacman-parity fast path"],
            ["upgrade","whole-system upgrade: repo + AUR in one change set"]
          ]'
          jq -n --arg raw "$raw" --arg play "$play" --arg compare "$compare" \
                --arg textdiff "$textdiff" --arg marker "$marker" --argjson demos "$demos" '
            {
              body: ($marker + "\n## 🎬 Screencasts for this PR\n\n"
                + "Recorded hermetically from this PR by `demos/build.sh` "
                + "(the same command reproduces them locally). Updates in place on each push.\n\n"
                + ($demos | map(
                    "#### \(.[0]) — \(.[1])\n\n"
                    + "[![\(.[0])](\($raw)/\(.[0]).gif)](\($play)/\(.[0]).cast)\n\n"
                    + "▶ [interactive player](\($play)/\(.[0]).cast)"
                  ) | join("\n\n"))
                + "\n\n**[▶ base-vs-PR side-by-side](\($compare))** — one scrub bar drives both "
                + "players, so you can line up `main` and this PR frame for frame.\n"
                + "**[≡ base-vs-PR text diff](\($textdiff))** — the normalized transcript diff, "
                + "so you can read exactly what output changed vs `main`.\n\n"
                + "_Recordings: [aurox-ci-media](https://github.com/nikicat/aurox-ci-media). "
                + "Base `main` set: [player index](https://nikicat.github.io/aurox-ci-media/)._")
            }' > /tmp/comment.json

          # --paginate merges list pages into one array; run jq once over it
          # (a per-page --jq would emit an id per matching page).
          id=$(gh api --paginate "repos/$REPO/issues/$PR/comments" \
                 | jq -r --arg m "$marker" '[.[] | select(.body | startswith($m))] | .[0].id // empty')
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$id" --input /tmp/comment.json >/dev/null
            echo "updated sticky comment $id"
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" --input /tmp/comment.json >/dev/null
            echo "created sticky comment"
          fi
